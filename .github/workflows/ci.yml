name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — typecheck & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          # Tests mock the DB — these values satisfy env validation only.
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gitpulse_test
          OPENAI_API_KEY: sk-test-key
          GITHUB_TOKEN: ghp_testtoken
          GITHUB_CLIENT_ID: test-client-id
          GITHUB_CLIENT_SECRET: test-client-secret
          SESSION_SECRET: test-session-secret-that-is-at-least-32-chars
          NODE_ENV: test

  frontend:
    name: Frontend — typecheck, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Points to the production backend; build must succeed with any value.
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://gitpulse-backend.onrender.com' }}
