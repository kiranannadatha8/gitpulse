[build]
  # Railway detects each service from its subdirectory

[[services]]
  name = "backend"
  source = "backend"

  [services.build]
    builder = "DOCKERFILE"
    dockerfilePath = "Dockerfile"

  [services.deploy]
    startCommand = "npx prisma migrate deploy && node dist/server.js"
    healthcheckPath = "/api/health"
    healthcheckTimeout = 30
    restartPolicyType = "ON_FAILURE"
    restartPolicyMaxRetries = 3

[[services]]
  name = "frontend"
  source = "frontend"

  [services.build]
    builder = "DOCKERFILE"
    dockerfilePath = "Dockerfile"

  [services.deploy]
    restartPolicyType = "ON_FAILURE"
    restartPolicyMaxRetries = 3
